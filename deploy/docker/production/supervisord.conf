[supervisord]
pidfile=%(here)s/supervisord.pid
logfile_maxbytes=50MB
logfile_backups=10
loglevel=info
nodaemon=true
minfds=1024
minprocs=200
user=nginx

# App workers log to rotating files under /var/log/smaht so the Splunk forwarder
# can tail them (see splunk/inputs.conf). The log-shipper program below re-emits
# those files to stdout so container stdout -> CloudWatch is preserved.
[program:smaht1]
autorestart=true
startsecs=6
command=pserve production.ini http_port=6543
stdout_logfile=/var/log/smaht/smaht1.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_maxbytes=0
redirect_stderr=true

[program:smaht2]
autorestart=true
startsecs=6
command=pserve production.ini http_port=6544
stdout_logfile=/var/log/smaht/smaht2.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_maxbytes=0
redirect_stderr=true

[program:smaht3]
autorestart=true
startsecs=6
command=pserve production.ini http_port=6545
stdout_logfile=/var/log/smaht/smaht3.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_maxbytes=0
redirect_stderr=true

[program:smaht4]
autorestart=true
startsecs=6
command=pserve production.ini http_port=6546
stdout_logfile=/var/log/smaht/smaht4.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_maxbytes=0
redirect_stderr=true

[program:smaht5]
autorestart=true
startsecs=6
command=pserve production.ini http_port=6547
stdout_logfile=/var/log/smaht/smaht5.log
stdout_logfile_maxbytes=50MB
stdout_logfile_backups=5
stderr_logfile_maxbytes=0
redirect_stderr=true

[program:nginx]
autorestart=true
startsecs=5
command=/usr/sbin/nginx -g "daemon off;"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
redirect_stderr=true

# Re-emit the app worker log files to container stdout so they still reach
# CloudWatch (the app workers now write to disk for the forwarder). tail -F
# follows across supervisord's log rotation.
[program:log-shipper]
autorestart=true
startsecs=5
command=tail -n0 -F /var/log/smaht/smaht1.log /var/log/smaht/smaht2.log /var/log/smaht/smaht3.log /var/log/smaht/smaht4.log /var/log/smaht/smaht5.log
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
redirect_stderr=true

# Splunk Universal Forwarder (HMS/FISMA compliance agent). Replaces the doc's
# systemd boot-start; runs as the non-root nginx user. The wrapper seeds a random
# admin credential on first boot, starts splunkd, and ties its lifetime to it.
[program:splunkforwarder]
autorestart=true
startsecs=20
command=/home/nginx/smaht-portal/run_splunk_forwarder.sh
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
redirect_stderr=true

# nginx now runs in the foreground under supervisord (the entrypoints no longer
# `service nginx start`), so its lifetime/restarts are managed alongside the workers.
[program:nginx]
autorestart=true
startsecs=5
command=/usr/sbin/nginx -g "daemon off;"
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
redirect_stderr=true
