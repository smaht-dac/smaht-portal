# Local file inputs for the SMaHT-Portal app container.
#
# In a container the OS security logs the HMS doc targets (/var/log/secure,
# /var/log/audit) do not meaningfully exist, so we monitor the app + web logs
# this container writes to disk instead (app worker output via supervisord, and
# nginx access/error logs). All of these paths are owned by the non-root `nginx`
# user that runs both the app and the forwarder, so no setfacl step is needed.
#
# `index` is intentionally left unset: index routing is governed by the config
# the HMS deployment server pushes (deploymentclient.conf) and the indexer-side
# defaults. Set an explicit `index =` here if these logs must land in a
# specific index.

# Match the active file and supervisord's rotated backups (smahtN.log.1..5) so no
# tail is lost across rotation; Splunk's fishbucket dedupes already-read content.
[monitor:///var/log/smaht/smaht*.log*]
disabled = false
sourcetype = smaht:app
# Distinguish rotated files that share a header so they aren't skipped as dupes.
crcSalt = <SOURCE>

[monitor:///var/log/nginx/access.log]
disabled = false
sourcetype = nginx:access

[monitor:///var/log/nginx/error.log]
disabled = false
sourcetype = nginx:error
