# Point the Splunk Universal Forwarder at the HMS Splunk deployment server.
# This is the doc's `splunk set deploy-poll 10.124.5.202:8089` step expressed as
# config. After the forwarder phones home, the deployment server pushes the app
# configuration - outputs to the indexers (where data is sent) plus any
# additional inputs - so we do NOT define outputs.conf locally.
[deployment-client]

[target-broker:deploymentServer]
targetUri = 10.124.5.202:8089
