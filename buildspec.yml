version: 0.2

# dhi.io (Docker Hardened Images) is a private registry, so the base image in the
# Dockerfile (dhi.io/python:...) requires authentication before `docker build` can
# pull it. Credentials are read from Secrets Manager (a JSON secret with username/token
# keys). The CodeBuild service role needs secretsmanager:GetSecretValue on this secret.
env:
  secrets-manager:
    DHI_USERNAME: "dhi-registry-credentials:username"
    DHI_TOKEN: "dhi-registry-credentials:token"

phases:
  pre_build:
    commands:
      - touch deploy/docker/local/docker_development.ini  # cheap substitute for prepare-docker to make ignored file
      - chmod +x ./buildspec_create_gitinfo.sh
      - ./buildspec_create_gitinfo.sh
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - echo Logging in to dhi.io...
      - echo "$DHI_TOKEN" | docker login dhi.io --username "$DHI_USERNAME" --password-stdin
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG .
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME:$IMAGE_TAG
      # Pull the CrowdStrike Falcon Container Sensor and mirror it into ECR.
      # Note: -c/--copy is the destination registry; -r/--region is the Falcon cloud
