      # - SENSOR_IMAGE_NAME=${SENSOR_IMAGE_PATH##*/}; SENSOR_IMAGE_NAME=${SENSOR_IMAGE_NAME%:*}
      # # Copy the versioned image into ECR.
      # - ./falcon-container-sensor-pull.sh -u $FALCON_CLIENT_ID -s $FALCON_CLIENT_SECRET -t falcon-container -c $FALCON_ECR
      # # Tag/push as latest only if it differs from what's already in ECR. Compare the
